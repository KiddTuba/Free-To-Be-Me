<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Is A Freedom Song - Interactive Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .font-serif {
            font-family: 'Merriweather', serif;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .animate-scale-in {
            animation: scaleIn 0.6s ease-out forwards;
        }

        /* Container transitions */
        #app-container {
            transition: background-color 0.7s ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="app-container" class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-8 transition-colors duration-700 ease-in-out bg-slate-50">
        
        <!-- Book Container -->
        <div class="relative w-full max-w-6xl bg-white/40 backdrop-blur-sm rounded-3xl shadow-2xl overflow-hidden border border-white/50 flex flex-col md:flex-row min-h-[80vh] md:min-h-[600px]">
            
            <!-- Left Side (Text content) -->
            <div class="flex-1 p-8 md:p-16 flex flex-col justify-center overflow-y-auto">
                <div id="page-content" class="animate-fade-in transition-opacity duration-500">
                    <!-- Dynamic content injected here -->
                </div>
            </div>

            <!-- Right Side (Illustration) -->
            <div class="flex-1 bg-white/60 p-8 md:p-12 flex items-center justify-center border-t md:border-t-0 md:border-l border-white/50">
                <div id="page-illustration" class="w-full max-w-[400px] aspect-square rounded-2xl overflow-hidden shadow-inner bg-white animate-scale-in flex items-center justify-center">
                    <!-- Dynamic illustration injected here -->
                </div>
            </div>

        </div>

        <!-- Navigation Controls -->
        <div class="flex items-center justify-between w-full max-w-xl mt-8 px-4">
            <button id="btn-prev" class="flex items-center gap-2 px-6 py-3 rounded-full font-bold transition-all bg-white text-slate-700 shadow-md hover:shadow-lg hover:-translate-x-1 active:scale-95 opacity-0 cursor-default" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                Previous
            </button>

            <div id="page-indicator" class="text-slate-500 font-semibold tracking-widest text-sm">
                1 / 20
            </div>

            <button id="btn-next" class="flex items-center gap-2 px-6 py-3 rounded-full font-bold transition-all bg-indigo-600 text-white shadow-md hover:shadow-lg hover:bg-indigo-700 hover:translate-x-1 active:scale-95">
                Next
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </div>
    </div>

        const SvgMosaic = `

                <circle cx="290" cy="280" r="10" fill="#ffffff" />
                <circle cx="300" cy="310" r="10" fill="#ffffff" />
            </svg>`;

        const SvgSprout = `
            <svg viewBox="0 0 400 400" class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="400" height="400" fill="#f0fdf4" rx="20" />
                <path d="M 0 320 L 400 320 L 400 400 L 0 400 Z" fill="#166534" />

        const SvgPuzzle = `
            <svg viewBox="0 0 400 400" class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="400" height="400" fill="#eff6ff" rx="20" />

                    <rect x="0" y="0" width="140" height="140" fill="#3b82f6" rx="10" />
                    <circle cx="70" cy="-20" r="30" fill="#3b82f6" />

        const SvgMusic = `
            <svg viewBox="0 0 400 400" class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <rect width="400" height="400" fill="#f8fafc" rx="20" />

        // --- HELPERS ---

        function getImageHTML(src, alt) {
            return `<img src="${src}" alt="${alt}" class="w-full h-full object-contain object-center p-2" onerror="this.onerror=null; this.src='https://placehold.co/400x400/e2e8f0/475569?text=Image+Missing';"/>`;

        function getAffirmationHTML(label, text, borderColorClass, textColorClass, isFinal = false) {

                <div class="flex flex-col justify-center h-full space-y-8">

                        <p class="text-3xl md:text-4xl font-bold text-slate-800 leading-tight">
                            ${text}
                        </p>
                    </div>
                    ${audioPlayerHTML}
                </div>
            `;
        }

        function getTextHTML(paragraphs) {
            const pTags = paragraphs.map(p => `<p>${p}</p>`).join('');
            return `<div class="space-y-6 text-xl md:text-2xl font-serif text-slate-700 leading-relaxed">${pTags}</div>`;

            {
                type: 'text',
                bgColor: 'bg-emerald-50',
                content: getTextHTML([
                    "Not likes.<br/>Not laughs.<br/>Not clothes.<br/>Not phones.<br/>Not whispers.<br/>Not crowds.<br/>Not sitting alone.<br/>None of these<br/>get to measure my life.",

            },
            {

                ]),
                illustration: SvgBirdsFlying
            },
            {
                type: 'affirmation',
                bgColor: 'bg-blue-100',
                content: getAffirmationHTML('Final Affirmation', 'I am free to be me.', 'border-sky-400', 'text-sky-500', true),
                illustration: getImageHTML('I am free to be me.png', 'I am free to be me')
            }
        ];

        let currentPage = 0;

        const container = document.getElementById('app-container');
        const contentDiv = document.getElementById('page-content');
        const illustrationDiv = document.getElementById('page-illustration');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const pageIndicator = document.getElementById('page-indicator');

        function renderPage() {
            const spread = spreads[currentPage];

            // Update background color
            container.className = `min-h-screen flex flex-col items-center justify-center p-4 sm:p-8 transition-colors duration-700 ease-in-out ${spread.bgColor}`;

            // Reset animation by triggering reflow
            contentDiv.classList.remove('animate-fade-in');
            illustrationDiv.classList.remove('animate-scale-in');
            void contentDiv.offsetWidth; 
            void illustrationDiv.offsetWidth;

            // Inject content
            contentDiv.innerHTML = spread.content;
            illustrationDiv.innerHTML = spread.illustration;

            // Add animation classes back
            contentDiv.classList.add('animate-fade-in');
            illustrationDiv.classList.add('animate-scale-in');

            // Update Page Indicator
            pageIndicator.textContent = `${currentPage + 1} / ${spreads.length}`;

            // Update Previous Button
            if (currentPage === 0) {
                btnPrev.disabled = true;
                btnPrev.classList.add('opacity-0', 'cursor-default');
                btnPrev.classList.remove('bg-white', 'text-slate-700', 'shadow-md', 'hover:shadow-lg', 'hover:-translate-x-1', 'active:scale-95');
            } else {
                btnPrev.disabled = false;
                btnPrev.classList.remove('opacity-0', 'cursor-default');
                btnPrev.classList.add('bg-white', 'text-slate-700', 'shadow-md', 'hover:shadow-lg', 'hover:-translate-x-1', 'active:scale-95');
            }

            // Update Next Button
            if (currentPage === spreads.length - 1) {
                btnNext.disabled = true;
                btnNext.classList.add('opacity-0', 'cursor-default');
                btnNext.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');
            } else {
                btnNext.disabled = false;
                btnNext.classList.remove('opacity-0', 'cursor-default');
                btnNext.classList.add('bg-indigo-600', 'hover:bg-indigo-700');
            }

            // Optional: Pause any playing audio when page turns
            const audios = document.querySelectorAll('audio');
            audios.forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
        }

        btnPrev.addEventListener('click', () => {
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            }
        });

        btnNext.addEventListener('click', () => {
            if (currentPage < spreads.length - 1) {
                currentPage++;
                renderPage();
            }
        });

        // Initial render
        renderPage();
    </script>
